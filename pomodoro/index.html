<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>
    
<button class="menu-btn" onclick="goToMenu()">
  ⬅ Voltar ao Menu
</button>

  <div class="container">
    <h1>CRONÔMETRO POMODORO</h1>

    <div class="timer" id="timer">
      25:00
    </div>

    <div class="buttons">
      <button class="start" onclick="startTimer()">Iniciar</button>
      <button class="pause" onclick="pauseTimer()">Pausar</button>
      <button class="reset" onclick="resetTimer()">Resetar</button>
    </div>

   <div class="config">
  <h2>⚙️ CONFIGURAR TEMPO</h2>

  <div class="time-control">
    <label></label>

    <div class="time-control">
  <label for="studyInput">TEMPO DE ESTUDO</label>

  <input
    type="number"
    id="studyInput"
    value="25"
    min="1"
  >
</div>

<div class="time-control">
  <label for="breakInput">TEMPO DE PAUSA</label>

  <input
    type="number"
    id="breakInput"
    value="5"
    min="1"
  >
</div>
<button class="apply-btn" onclick="applySettings()">
  Aplicar Tempo
</button>

  <script src="./script.js"></script>

</body>
</html>
